<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>एक नज़र</title>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f0ece4;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── Top bar ── */
  .topbar {
    background: #fff;
    padding: 14px 18px 12px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    border-bottom: 1px solid #e8e0d4;
    flex-shrink: 0;
    position: relative;
  }

  .back-btn {
    width: 34px; height: 34px;
    background: #f5f0e8;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none; color: #1a1208; font-size: 16px;
    border: 1px solid #e0d4c0;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .topbar-center { flex: 1; padding: 0 14px; }

  .topbar-title {
    font-family: 'Tiro Devanagari Hindi', serif;
    font-size: 19px;
    color: #1a1208;
    line-height: 1.2;
  }

  .topbar-title span { color: #d4500a; }

  .topbar-sub {
    font-size: 11px;
    color: #7a6a52;
    margin-top: 2px;
  }

  .card-counter {
    font-size: 13px;
    font-weight: 600;
    color: #7a6a52;
    padding-top: 4px;
    flex-shrink: 0;
  }

  .card-counter strong { color: #1a1208; }

  /* ── Slot tabs ── */
  .slot-tabs {
    background: #fff;
    display: flex;
    border-bottom: 1px solid #e8e0d4;
    flex-shrink: 0;
  }

  .slot-tab {
    flex: 1; padding: 10px 6px;
    font-size: 12px; font-weight: 600;
    color: #7a6a52; cursor: pointer;
    border: none; background: none;
    font-family: 'DM Sans', sans-serif;
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    text-align: center;
    position: relative;
  }

  .slot-tab.active { color: #d4500a; border-bottom-color: #d4500a; }

  .slot-dot {
    display: none;
    position: absolute; top: 7px; right: 18%;
    width: 5px; height: 5px;
    background: #d4500a; border-radius: 50%;
  }

  .slot-tab.has-content .slot-dot { display: block; }

  /* ── Progress bar ── */
  .progress-wrap {
    height: 3px;
    background: #e8e0d4;
    flex-shrink: 0;
  }

  .progress-bar {
    height: 100%;
    background: #d4500a;
    transition: width 0.3s ease;
    border-radius: 0 2px 2px 0;
  }

  /* ── Card container (swipeable) ── */
  .card-viewport {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .card-track {
    display: flex;
    height: 100%;
    transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    will-change: transform;
  }

  /* ── Single card ── */
  .news-card {
    min-width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    background: #fff;
    overflow: hidden;
  }

  .card-image {
    width: 100%;
    height: 220px;
    object-fit: cover;
    background: #e8e0d4;
    display: flex; align-items: center; justify-content: center;
    font-size: 48px;
    flex-shrink: 0;
    position: relative;
  }

  .card-image img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }

  .card-image-placeholder { font-size: 40px; opacity: 0.3; }

  .card-body {
    flex: 1;
    padding: 18px 18px 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .card-tags {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .card-tag {
    font-size: 11px;
    font-weight: 600;
    color: #d4500a;
    letter-spacing: 0.03em;
  }

  .card-tag-sep { color: #c8b8a0; font-size: 11px; }

  .card-headline {
    font-family: 'Tiro Devanagari Hindi', serif;
    font-size: 20px;
    line-height: 1.4;
    color: #1a1208;
    margin-bottom: 14px;
    font-weight: 400;
  }

  .card-headline em { color: #d4500a; font-style: normal; }

  .card-divider {
    height: 1px;
    background: #e8e0d4;
    margin-bottom: 14px;
  }

  /* Summary as bullet points */
  .card-bullets {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-bottom: 16px;
  }

  .bullet-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .bullet-num {
    width: 20px; height: 20px;
    background: #f5f0e8;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
    color: #d4500a;
    flex-shrink: 0;
    margin-top: 1px;
    border: 1px solid #e8d8c0;
  }

  .bullet-text {
    font-size: 14px;
    line-height: 1.6;
    color: #3a2e20;
  }

  /* ── Bottom CTA ── */
  .card-footer {
    background: #fff;
    padding: 12px 18px;
    border-top: 1px solid #e8e0d4;
    flex-shrink: 0;
  }

  .read-more-btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: rgba(212,80,10,0.08);
    border: 1px solid rgba(212,80,10,0.2);
    border-radius: 8px;
    color: #d4500a;
    font-family: 'Tiro Devanagari Hindi', serif;
    font-size: 17px;
    text-align: center;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.2s;
  }

  .read-more-btn:active { background: rgba(212,80,10,0.15); }

  /* ── Nav arrows ── */
  .nav-arrows {
    position: absolute;
    bottom: 80px;
    right: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 10;
  }

  .nav-arrow {
    width: 36px; height: 36px;
    background: rgba(255,255,255,0.9);
    border: 1px solid #e0d4c0;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    transition: all 0.2s;
  }

  .nav-arrow:hover { background: #fff; box-shadow: 0 3px 12px rgba(0,0,0,0.15); }
  .nav-arrow:disabled { opacity: 0.3; cursor: default; }

  /* ── Empty / loading ── */
  .state-screen {
    min-width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    text-align: center;
    background: #fff;
    gap: 12px;
  }

  .state-icon { font-size: 48px; opacity: 0.3; }
  .state-title { font-family: 'Tiro Devanagari Hindi', serif; font-size: 22px; color: #1a1208; }
  .state-sub { font-size: 13px; color: #7a6a52; line-height: 1.6; }

  .anim-bar {
    width: 60px; height: 3px; background: #e8e0d4; border-radius: 2px; overflow: hidden; margin-top: 8px;
  }
  .anim-fill {
    height: 100%; width: 30%; background: #d4500a; border-radius: 2px;
    animation: fill 1.8s ease-in-out infinite alternate;
  }
  @keyframes fill { from { width: 10%; } to { width: 90%; } }

  /* Skeleton */
  .skel-card {
    min-width: 100%; height: 100%;
    background: #fff; display: flex; flex-direction: column;
  }
  .skel-img { width: 100%; height: 220px; background: #ede8e0; flex-shrink: 0; animation: shimmer 1.5s infinite; }
  .skel-body { padding: 18px; flex: 1; }
  .skel-line { height: 14px; border-radius: 4px; background: #ede8e0; margin-bottom: 10px; animation: shimmer 1.5s infinite; }
  @keyframes shimmer {
    0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; }
  }

  /* Update toast */
  .update-toast {
    position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
    background: #1a1208; color: #fff;
    font-size: 12px; font-weight: 600;
    padding: 9px 18px; border-radius: 20px;
    display: flex; align-items: center; gap: 7px;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
    z-index: 100; white-space: nowrap;
  }
  .update-toast.show { opacity: 1; }
  .toast-dot { width: 6px; height: 6px; background: #d4500a; border-radius: 50%; }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <a class="back-btn" href="ek-nazar-landing.html">←</a>
  <div class="topbar-center">
    <div class="topbar-title" id="topbarTitle">सुबह की <span>एक नज़र</span></div>
    <div class="topbar-sub" id="topbarSub"></div>
  </div>
  <div class="card-counter"><strong id="curNum">—</strong> / <span id="totNum">—</span></div>
</div>

<!-- Slot tabs -->
<div class="slot-tabs">
  <button class="slot-tab active" data-slot="सुबह" onclick="switchSlot('सुबह')">
    🌅 सुबह<div class="slot-dot"></div>
  </button>
  <button class="slot-tab" data-slot="दोपहर" onclick="switchSlot('दोपहर')">
    ☀️ दोपहर<div class="slot-dot"></div>
  </button>
  <button class="slot-tab" data-slot="शाम" onclick="switchSlot('शाम')">
    🌆 शाम<div class="slot-dot"></div>
  </button>
</div>

<!-- Progress -->
<div class="progress-wrap">
  <div class="progress-bar" id="progressBar" style="width:0%"></div>
</div>

<!-- Card viewport -->
<div class="card-viewport" id="cardViewport">
  <div class="card-track" id="cardTrack">
    <!-- skeleton -->
    <div class="skel-card">
      <div class="skel-img"></div>
      <div class="skel-body">
        <div class="skel-line" style="width:40%;height:12px;margin-bottom:14px"></div>
        <div class="skel-line" style="width:100%;height:22px;margin-bottom:8px"></div>
        <div class="skel-line" style="width:80%;height:22px;margin-bottom:20px"></div>
        <div class="skel-line" style="width:100%"></div>
        <div class="skel-line" style="width:95%"></div>
        <div class="skel-line" style="width:70%"></div>
      </div>
    </div>
  </div>

  <!-- nav arrows -->
  <div class="nav-arrows">
    <button class="nav-arrow" id="prevBtn" onclick="goTo(currentIdx-1)" disabled>↑</button>
    <button class="nav-arrow" id="nextBtn" onclick="goTo(currentIdx+1)">↓</button>
  </div>
</div>

<!-- Footer CTA — rendered per card -->
<div class="card-footer" id="cardFooter" style="display:none">
  <a class="read-more-btn" id="readMoreBtn" href="#" target="_blank">पूरी खबर पढ़ें →</a>
</div>

<!-- Update toast -->
<div class="update-toast" id="updateToast"><div class="toast-dot"></div> नई खबरें आई हैं!</div>

<script>
  const STORAGE_KEY = 'ek_nazar_bundles';
  let currentSlot = 'सुबह';
  let currentIdx = 0;
  let cards = [];

  // Date display
  const now = new Date();
  document.getElementById('topbarSub').textContent = now.toLocaleDateString('hi-IN', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  }) + ' • ' + currentSlot + ' ' + now.toLocaleTimeString('hi-IN', { hour: '2-digit', minute: '2-digit' });

  function getToday() { return new Date().toISOString().split('T')[0]; }

  function loadBundles() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
  }

  function getSlotBundle(slot) {
    const all = loadBundles().filter(b => b.date === getToday() && b.slot === slot);
    return all.sort((a,b) => new Date(b.savedAt) - new Date(a.savedAt))[0];
  }

  function updateSlotDots() {
    const todaySlots = loadBundles().filter(b => b.date === getToday()).map(b => b.slot);
    document.querySelectorAll('.slot-tab').forEach(t => {
      t.classList.toggle('has-content', todaySlots.includes(t.dataset.slot));
    });
  }

  function switchSlot(slot) {
    currentSlot = slot;
    currentIdx = 0;
    document.querySelectorAll('.slot-tab').forEach(t => t.classList.toggle('active', t.dataset.slot === slot));
    const titles = { 'सुबह': 'सुबह की', 'दोपहर': 'दोपहर की', 'शाम': 'शाम की' };
    document.getElementById('topbarTitle').innerHTML = `${titles[slot]} <span>एक नज़र</span>`;
    renderCards();
  }

  function summaryToBullets(summary) {
    // Split on common sentence endings or — dashes for bullets
    const raw = summary.trim();
    // Try splitting on। or . or — 
    let parts = raw.split(/[।\.]+/).map(s=>s.trim()).filter(s=>s.length > 10);
    if (parts.length < 2) parts = raw.split(/[,،—–-]/).map(s=>s.trim()).filter(s=>s.length > 15);
    if (parts.length < 2) {
      // fallback: chunk into ~40 word segments
      const words = raw.split(' ');
      parts = [];
      for (let i=0; i<words.length; i+=Math.ceil(words.length/3)) {
        parts.push(words.slice(i, i+Math.ceil(words.length/3)).join(' '));
      }
    }
    return parts.slice(0, 4);
  }

  function renderCards() {
    const bundle = getSlotBundle(currentSlot);
    updateSlotDots();
    const track = document.getElementById('cardTrack');
    const footer = document.getElementById('cardFooter');

    if (!bundle || !bundle.stories || !bundle.stories.length) {
      const todayAny = loadBundles().filter(b=>b.date===getToday()).length > 0;
      track.innerHTML = `
        <div class="state-screen">
          <div class="state-icon">📰</div>
          <div class="state-title">${currentSlot} की खबरें</div>
          <div class="state-sub">${todayAny ? 'इस slot की bundle अभी तैयार नहीं हुई।<br>थोड़ी देर में आएगी।' : 'Editorial team bundle बना रही है।<br>जल्द आ रहा है।'}</div>
          <div class="anim-bar"><div class="anim-fill"></div></div>
        </div>`;
      footer.style.display = 'none';
      updateCounter(0, 0);
      updateProgress(0, 0);
      return;
    }

    cards = bundle.stories;
    footer.style.display = 'block';

    track.innerHTML = cards.map((s, i) => {
      const bullets = summaryToBullets(s.summary);
      const mediaHtml = s.mediaUrl
        ? `<div class="card-image"><img src="${s.mediaUrl}" alt="" onerror="this.parentElement.innerHTML='<div class=card-image-placeholder>📰</div>'"></div>`
        : `<div class="card-image"><div class="card-image-placeholder">📰</div></div>`;

      const bulletHtml = bullets.map((b,bi) => `
        <div class="bullet-item">
          <div class="bullet-num">${bi+1}</div>
          <div class="bullet-text">${b}</div>
        </div>`).join('');

      return `
        <div class="news-card">
          ${mediaHtml}
          <div class="card-body">
            <div class="card-tags">
              <span class="card-tag">${s.tag}</span>
              <span class="card-tag-sep">·</span>
              <span class="card-tag">भास्कर</span>
            </div>
            <div class="card-headline">${s.headline}</div>
            <div class="card-divider"></div>
            <div class="card-bullets">${bulletHtml}</div>
          </div>
        </div>`;
    }).join('');

    goTo(currentIdx, false);
  }

  function goTo(idx, animate = true) {
    if (!cards.length) return;
    idx = Math.max(0, Math.min(idx, cards.length - 1));
    currentIdx = idx;

    const track = document.getElementById('cardTrack');
    if (!animate) track.style.transition = 'none';
    track.style.transform = `translateX(-${idx * 100}%)`;
    if (!animate) setTimeout(() => track.style.transition = '', 50);

    updateCounter(idx + 1, cards.length);
    updateProgress(idx + 1, cards.length);

    const s = cards[idx];
    if (s) {
      const btn = document.getElementById('readMoreBtn');
      btn.href = s.deepLink || s.articleUrl || '#';
      btn.style.pointerEvents = (s.deepLink || s.articleUrl) ? 'auto' : 'none';
    }

    document.getElementById('prevBtn').disabled = idx === 0;
    document.getElementById('nextBtn').disabled = idx === cards.length - 1;
  }

  function updateCounter(cur, tot) {
    document.getElementById('curNum').textContent = cur || '—';
    document.getElementById('totNum').textContent = tot || '—';
  }

  function updateProgress(cur, tot) {
    const pct = tot > 0 ? (cur / tot) * 100 : 0;
    document.getElementById('progressBar').style.width = pct + '%';
  }

  // Swipe support
  let touchStartX = 0, touchStartY = 0;
  const vp = document.getElementById('cardViewport');

  vp.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  vp.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
      if (dx < 0) goTo(currentIdx + 1);
      else goTo(currentIdx - 1);
    }
  }, { passive: true });

  // Init
  setTimeout(() => renderCards(), 400);

  // Live update
  window.addEventListener('storage', e => {
    if (e.key === STORAGE_KEY) {
      const oldCount = cards.length;
      renderCards();
      const t = document.getElementById('updateToast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
  });
</script>
</body>
</html>
