<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>एक नज़र</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans Devanagari', sans-serif; background: #f0ece4; height: 100vh; overflow: hidden; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; }
.topbar { background: #fff; padding: 12px 16px 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e8e0d4; flex-shrink: 0; }
.back-btn { width: 32px; height: 32px; background: #f5f0e8; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; color: #1a1208; font-size: 15px; border: 1px solid #e0d4c0; flex-shrink: 0; }
.topbar-center { flex: 1; padding: 0 12px; }
.topbar-title { font-size: 17px; font-weight: 600; color: #1a1208; line-height: 1.2; }
.topbar-title span { color: #d4500a; }
.topbar-sub { font-size: 11px; color: #7a6a52; margin-top: 2px; }
.card-counter { font-size: 12px; font-weight: 600; color: #7a6a52; flex-shrink: 0; }
.card-counter strong { color: #1a1208; }
.slot-tabs { background: #fff; display: flex; border-bottom: 1px solid #e8e0d4; flex-shrink: 0; padding: 6px 12px; gap: 6px; }
.slot-tab { flex: 1; padding: 6px 4px; font-size: 13px; font-weight: 600; color: #7a6a52; cursor: pointer; border: none; background: none; font-family: 'Noto Sans Devanagari', sans-serif; border-radius: 20px; transition: all 0.2s; text-align: center; position: relative; }
.slot-tab.active { color: #d4500a; background: rgba(212,80,10,0.1); }
.fresh-dot { display: none; position: absolute; top: 4px; right: 10px; width: 7px; height: 7px; background: #d4500a; border-radius: 50%; border: 1.5px solid #fff; }
.slot-tab.has-fresh .fresh-dot { display: block; }
.slot-tab.active .fresh-dot { display: none; }
.progress-wrap { height: 3px; background: #e8e0d4; flex-shrink: 0; }
.progress-bar { height: 100%; background: #d4500a; transition: width 0.3s ease; }
.card-viewport { flex: 1; overflow: hidden; position: relative; }
.card-track { display: flex; height: 100%; transition: transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94); will-change: transform; }
.news-card { min-width: 100%; width: 100%; height: 100%; display: flex; flex-direction: column; background: #fff; overflow: hidden; flex-shrink: 0; }
.card-image { width: 100%; height: 170px; background: #e8e0d4; flex-shrink: 0; overflow: hidden; position: relative; }
.card-image img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card-image-placeholder { font-size: 36px; opacity: 0.25; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
.card-tag { position: absolute; bottom: 10px; left: 12px; font-size: 11px; font-weight: 700; color: #fff; letter-spacing: 0.04em; background: rgba(212,80,10,0.88); padding: 3px 9px; border-radius: 12px; z-index: 2; }
.video-thumb { width: 100%; height: 100%; background: #111; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
.play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 52px; height: 52px; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid rgba(255,255,255,0.85); z-index: 3; }
.play-btn::after { content: ''; display: block; width: 0; height: 0; border-style: solid; border-width: 9px 0 9px 18px; border-color: transparent transparent transparent #fff; margin-left: 4px; }
.video-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; align-items: center; justify-content: center; }
.video-overlay.open { display: flex; }
.video-overlay video { width: 100%; max-height: 100vh; object-fit: contain; }
.video-close { position: absolute; top: 16px; right: 16px; width: 38px; height: 38px; background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.5); border-radius: 50%; color: #fff; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; }
.card-body { flex: 1; padding: 12px 16px 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.card-headline { font-size: 16px; font-weight: 600; line-height: 1.45; color: #1a1208; margin-bottom: 10px; }
.card-divider { height: 1px; background: #e8e0d4; margin-bottom: 12px; }
.card-bullets { display: flex; flex-direction: column; gap: 10px; padding-bottom: 14px; }
.bullet-item { display: flex; align-items: flex-start; gap: 8px; }
.bullet-dot { color: #d4500a; font-size: 16px; line-height: 1.6; flex-shrink: 0; }
.bullet-text { font-size: 14px; font-weight: 400; line-height: 1.6; color: #3a2e20; }
.bullet-text strong { font-weight: 700; color: #1a1208; }
.card-footer { background: #fff; padding: 8px 16px 10px; border-top: 1px solid #e8e0d4; flex-shrink: 0; }
.read-more-btn { display: block; width: 100%; padding: 10px; background: rgba(212,80,10,0.07); border: 1px solid rgba(212,80,10,0.2); border-radius: 8px; color: #d4500a; font-family: 'Noto Sans Devanagari', sans-serif; font-size: 15px; text-align: center; text-decoration: none; cursor: pointer; }
.read-more-btn:active { background: rgba(212,80,10,0.14); }
.desktop-nav { display: none; }
@media (hover: hover) and (pointer: fine) {
  .desktop-nav { display: flex; justify-content: space-between; position: absolute; top: 50%; left: 0; right: 0; transform: translateY(-50%); pointer-events: none; padding: 0 8px; z-index: 10; }
  .desktop-nav-btn { pointer-events: all; width: 36px; height: 36px; background: rgba(255,255,255,0.92); border: 1px solid #e0d4c0; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.12); color: #1a1208; }
  .desktop-nav-btn:hover { background: #fff; }
  .desktop-nav-btn:disabled { opacity: 0.25; cursor: default; }
}
.state-screen { min-width: 100%; min-height: 300px; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; text-align: center; background: #fff; gap: 14px; }
.state-icon { font-size: 44px; opacity: 0.25; }
.state-title { font-size: 20px; font-weight: 600; color: #1a1208; }
.state-sub { font-size: 13px; color: #7a6a52; line-height: 1.6; }
.anim-bar { width: 60px; height: 3px; background: #e8e0d4; border-radius: 2px; overflow: hidden; margin-top: 8px; }
.anim-fill { height: 100%; background: #d4500a; animation: fill 1.8s ease-in-out infinite alternate; }
@keyframes fill { from { width: 10%; } to { width: 90%; } }
/* ── Completion card ── */
.completion-card { min-width: 100%; width: 100%; height: 100%; display: flex; flex-direction: column; background: #fff; overflow-y: auto; flex-shrink: 0; }
.comp-top { padding: 24px 20px 16px; text-align: center; flex-shrink: 0; }
.comp-badge { width: 56px; height: 56px; border-radius: 50%; background: rgba(212,80,10,0.1); border: 2px solid rgba(212,80,10,0.2); display: flex; align-items: center; justify-content: center; font-size: 26px; margin: 0 auto 14px; }
.comp-title { font-size: 18px; font-weight: 700; color: #1a1208; margin-bottom: 6px; line-height: 1.3; }
.comp-sub { font-size: 13px; color: #7a6a52; line-height: 1.5; }
.comp-divider { height: 1px; background: #e8e0d4; margin: 0 20px; }
.comp-habit { padding: 16px 20px; flex-shrink: 0; }
.comp-habit-title { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #7a6a52; margin-bottom: 12px; }
.habit-grid { display: flex; flex-direction: column; gap: 8px; }
.habit-row { display: flex; align-items: center; gap: 8px; }
.habit-slot-label { font-size: 11px; font-weight: 600; color: #7a6a52; width: 52px; flex-shrink: 0; font-family: 'Noto Sans Devanagari', sans-serif; }
.habit-dots { display: flex; gap: 5px; flex: 1; }
.habit-dot { width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid #e8e0d4; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; color: #b0a090; flex-shrink: 0; background: #faf7f2; }
.habit-dot.done { background: #d4500a; border-color: #d4500a; color: #fff; font-size: 11px; }
.habit-dot.today { border-color: #d4500a; color: #d4500a; font-weight: 700; }
.comp-next { padding: 12px 20px; flex-shrink: 0; }
.comp-next-title { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #7a6a52; margin-bottom: 10px; }
.next-slot-row { display: flex; gap: 8px; }
.next-slot-pill { flex: 1; padding: 10px 8px; border: 1.5px solid #e8e0d4; border-radius: 10px; text-align: center; cursor: pointer; transition: all 0.2s; background: #faf7f2; }
.next-slot-pill.available { border-color: rgba(212,80,10,0.3); background: rgba(212,80,10,0.05); }
.next-slot-pill.active-now { border-color: #d4500a; background: rgba(212,80,10,0.08); }
.next-slot-pill .nsp-emoji { font-size: 16px; display: block; margin-bottom: 3px; }
.next-slot-pill .nsp-name { font-size: 11px; font-weight: 600; color: #1a1208; font-family: 'Noto Sans Devanagari', sans-serif; display: block; }
.next-slot-pill .nsp-status { font-size: 9px; color: #7a6a52; margin-top: 2px; display: block; }
.next-slot-pill.available .nsp-status { color: #d4500a; }
.comp-share { padding: 12px 20px 20px; flex-shrink: 0; }
.share-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 12px; border: 1.5px solid #e8e0d4; border-radius: 10px; background: none; color: #7a6a52; font-family: 'Noto Sans Devanagari', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.share-btn:active { border-color: #d4500a; color: #d4500a; background: rgba(212,80,10,0.05); }

.skel-card { min-width: 100%; height: 100%; background: #fff; display: flex; flex-direction: column; }
.skel-img { width: 100%; height: 170px; background: #ede8e0; flex-shrink: 0; animation: shimmer 1.5s infinite; }
.skel-body { padding: 16px; flex: 1; }
.skel-line { height: 13px; border-radius: 4px; background: #ede8e0; margin-bottom: 10px; animation: shimmer 1.5s infinite; }
@keyframes shimmer { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }
.update-toast { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); background: #1a1208; color: #fff; font-size: 12px; font-weight: 600; padding: 8px 16px; border-radius: 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 100; white-space: nowrap; display: flex; align-items: center; gap: 7px; }
.update-toast.show { opacity: 1; }
.toast-dot { width: 6px; height: 6px; background: #d4500a; border-radius: 50%; }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="ek-nazar-landing.html">←</a>
  <div class="topbar-center">
    <div class="topbar-title" id="topbarTitle">दोपहर की <span>एक नज़र</span></div>
    <div class="topbar-sub" id="topbarSub"></div>
  </div>
  <div class="card-counter"><strong id="curNum">—</strong> / <span id="totNum">—</span></div>
</div>

<div class="slot-tabs">
  <button class="slot-tab" data-slot="सुबह" onclick="switchSlot('सुबह')">🌅 सुबह<span class="fresh-dot"></span></button>
  <button class="slot-tab active" data-slot="दोपहर" onclick="switchSlot('दोपहर')">☀️ दोपहर<span class="fresh-dot"></span></button>
  <button class="slot-tab" data-slot="शाम" onclick="switchSlot('शाम')">🌆 शाम<span class="fresh-dot"></span></button>
</div>

<div class="progress-wrap">
  <div class="progress-bar" id="progressBar" style="width:0%"></div>
</div>

<div class="card-viewport" id="cardViewport">
  <div class="card-track" id="cardTrack">
    <div class="skel-card">
      <div class="skel-img"></div>
      <div class="skel-body">
        <div class="skel-line" style="width:35%;height:11px;margin-bottom:12px"></div>
        <div class="skel-line" style="width:100%;height:20px;margin-bottom:6px"></div>
        <div class="skel-line" style="width:75%;height:20px;margin-bottom:18px"></div>
        <div class="skel-line" style="width:100%"></div>
        <div class="skel-line" style="width:90%"></div>
        <div class="skel-line" style="width:65%"></div>
      </div>
    </div>
  </div>
  <div class="desktop-nav">
    <button class="desktop-nav-btn" id="prevBtn" onclick="goTo(currentIdx-1)" disabled>←</button>
    <button class="desktop-nav-btn" id="nextBtn" onclick="goTo(currentIdx+1)">→</button>
  </div>
</div>

<div class="card-footer" id="cardFooter" style="display:none">
  <a class="read-more-btn" id="readMoreBtn" href="#" target="_blank">पूरी खबर पढ़ें →</a>
</div>

<div class="video-overlay" id="videoOverlay">
  <video id="overlayVideo" controls playsinline></video>
  <div class="video-close" onclick="closeVideo()">✕</div>
</div>

<div class="update-toast" id="updateToast"><div class="toast-dot"></div> नई खबरें आई हैं!</div>

<script>
var STORAGE_KEY = 'ek_nazar_bundles';
var currentSlot = 'दोपहर';
var currentIdx = 0;
var cards = [];
var now = new Date();

function getToday() { return now.toISOString().split('T')[0]; }
function loadBundles() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { return []; } }
function getSlotBundle(slot) {
  var all = loadBundles().filter(function(b) { return b.date === getToday() && b.slot === slot; });
  return all.sort(function(a,b) { return new Date(b.savedAt) - new Date(a.savedAt); })[0];
}

var VISITED_KEY = 'ek_nazar_visited_' + getToday();
function getVisited() { try { return JSON.parse(sessionStorage.getItem(VISITED_KEY) || '[]'); } catch(e) { return []; } }
function markVisited(slot) { var v = getVisited(); if (v.indexOf(slot) === -1) { v.push(slot); sessionStorage.setItem(VISITED_KEY, JSON.stringify(v)); } }
function updateSlotDots() {
  var todaySlots = loadBundles().filter(function(b) { return b.date === getToday(); }).map(function(b) { return b.slot; });
  var visited = getVisited();
  document.querySelectorAll('.slot-tab').forEach(function(t) {
    t.classList.toggle('has-fresh', todaySlots.indexOf(t.dataset.slot) !== -1 && visited.indexOf(t.dataset.slot) === -1);
  });
}

function switchSlot(slot) {
  markVisited(slot);
  currentSlot = slot;
  currentIdx = 0;
  document.querySelectorAll('.slot-tab').forEach(function(t) { t.classList.toggle('active', t.dataset.slot === slot); });
  var titles = { 'सुबह': 'सुबह की', 'दोपहर': 'दोपहर की', 'शाम': 'शाम की' };
  document.getElementById('topbarTitle').innerHTML = titles[slot] + ' <span>एक नज़र</span>';
  updateSlotDots();
  renderCards();
}

function parseBullets(html) {
  if (!html) return [];
  var tmp = document.createElement('div');
  tmp.innerHTML = html;
  var res = [];
  tmp.querySelectorAll('div').forEach(function(node) {
    var text = (node.textContent || '').trim();
    if (text.charAt(0) === '•') {
      var inner = node.innerHTML.replace(/^•\s*/, '').trim();
      if (inner) res.push(inner);
    }
  });
  if (!res.length) {
    (tmp.textContent || '').split('\n').forEach(function(line) {
      var c = line.replace(/^•\s*/, '').trim();
      if (c.length > 3) res.push(c);
    });
  }
  if (!res.length) { var t = (tmp.textContent || '').trim(); if (t) res.push(t); }
  return res;
}

function openVideo(url) {
  var ov = document.getElementById('videoOverlay');
  var vid = document.getElementById('overlayVideo');
  vid.src = url;
  vid.load();
  vid.play();
  ov.classList.add('open');
}
function closeVideo() {
  var ov = document.getElementById('videoOverlay');
  var vid = document.getElementById('overlayVideo');
  vid.pause(); vid.src = '';
  ov.classList.remove('open');
}

function renderCards() {
  var bundle = getSlotBundle(currentSlot);
  updateSlotDots();
  var track = document.getElementById('cardTrack');
  var footer = document.getElementById('cardFooter');

  if (!bundle || !bundle.stories || !bundle.stories.length) {
    var times = { 'सुबह': 'सुबह 7:00 बजे', 'दोपहर': 'दोपहर 2:00 बजे', 'शाम': 'शाम 7:00 बजे' };
    var names = { 'सुबह': 'सुबह की एक नज़र', 'दोपहर': 'दोपहर की एक नज़र', 'शाम': 'शाम की एक नज़र' };
    track.innerHTML = '<div class="state-screen"><div class="state-icon">📰</div><div class="state-title">' + names[currentSlot] + '</div><div class="state-sub">' + times[currentSlot] + ' तक आएगी</div><div class="anim-bar"><div class="anim-fill"></div></div></div>';
    footer.style.display = 'none';
    updateCounter(0,0); updateProgress(0,0);
    return;
  }

  cards = bundle.stories;
  footer.style.display = 'block';

  var html = '';
  for (var i = 0; i < cards.length; i++) {
    var s = cards[i];
    var tag = s.tag || '';
    var mu = s.mediaUrl || '';
    var isVid = s.mediaType === 'video';
    var mediaHtml = '';

    if (mu && isVid) {
      var safeUrl = mu.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
      mediaHtml = '<div class="card-image"><span class="card-tag">' + tag + '</span><div class="video-thumb" onclick="openVideo(\'' + safeUrl + '\')"><div class="play-btn"></div></div></div>';
    } else if (mu) {
      mediaHtml = '<div class="card-image"><span class="card-tag">' + tag + '</span><img src="' + mu + '" alt="" onerror="this.parentNode.innerHTML=\'<span class=card-tag>' + tag.replace(/'/g,"\\'") + '</span><div class=card-image-placeholder>📰</div>\'"></div>';
    } else {
      mediaHtml = '<div class="card-image"><span class="card-tag">' + tag + '</span><div class="card-image-placeholder">📰</div></div>';
    }

    var bullets = parseBullets(s.summary);
    var bh = '';
    for (var j = 0; j < bullets.length; j++) {
      bh += '<div class="bullet-item"><div class="bullet-dot">•</div><div class="bullet-text">' + bullets[j] + '</div></div>';
    }
    if (!bh) bh = '<div class="bullet-text">—</div>';

    html += '<div class="news-card">' + mediaHtml + '<div class="card-body"><div class="card-headline">' + (s.headline||'') + '</div><div class="card-divider"></div><div class="card-bullets">' + bh + '</div></div></div>';
  }
  // Append completion card
  html += buildCompletionCard();
  track.innerHTML = html;
  goTo(0, false);
}

function buildCompletionCard() {
  var today = getToday();
  var all = loadBundles().filter(function(b) { return b.date === today; });
  var publishedSlots = all.map(function(b) { return b.slot; });
  var allSlots = ['सुबह', 'दोपहर', 'शाम'];
  var slotEmojis = { 'सुबह': '🌅', 'दोपहर': '☀️', 'शाम': '🌆' };
  var slotTimes = { 'सुबह': '7:00 AM', 'दोपहर': '2:00 PM', 'शाम': '7:00 PM' };

  // Build 7-day habit grid
  var habitHtml = '';
  var dayLabels = ['सो', 'म', 'म', 'ब', 'ग', 'शु', 'श'];
  for (var si = 0; si < allSlots.length; si++) {
    var slot = allSlots[si];
    var dotsHtml = '';
    for (var d = 6; d >= 0; d--) {
      var dt = new Date(now.getTime() - d * 86400000);
      var dtStr = dt.toISOString().split('T')[0];
      var bundles = loadBundles().filter(function(b) { return b.date === dtStr && b.slot === slot; });
      var isToday = (dtStr === today);
      var isDone = bundles.length > 0 && (d > 0 || publishedSlots.indexOf(slot) !== -1);
      var isCurrent = isToday && slot === currentSlot;
      var dotClass = 'habit-dot' + (isCurrent ? ' done' : isDone ? ' done' : isToday ? ' today' : '');
      var dotContent = (isCurrent || isDone) ? '✓' : (isToday ? '·' : dayLabels[6 - d]);
      dotsHtml += '<div class="' + dotClass + '">' + dotContent + '</div>';
    }
    habitHtml += '<div class="habit-row"><div class="habit-slot-label">' + slotEmojis[slot] + ' ' + slot + '</div><div class="habit-dots">' + dotsHtml + '</div></div>';
  }

  // Next slots
  var nextHtml = '';
  for (var ni = 0; ni < allSlots.length; ni++) {
    var ns = allSlots[ni];
    var isPublished = publishedSlots.indexOf(ns) !== -1;
    var isCurrentSlot = (ns === currentSlot);
    var pillClass = 'next-slot-pill' + (isCurrentSlot ? '' : isPublished ? ' available' : '');
    var statusText = isCurrentSlot ? 'अभी पढ़ रहे हैं' : isPublished ? 'उपलब्ध है →' : slotTimes[ns] + ' पर';
    var onclick = (!isCurrentSlot && isPublished) ? ' onclick="switchSlot(this.dataset.slot)" data-slot="' + ns + '"' : '';
    nextHtml += '<div class="' + pillClass + '"' + onclick + '><span class="nsp-emoji">' + slotEmojis[ns] + '</span><span class="nsp-name">' + ns + '</span><span class="nsp-status">' + statusText + '</span></div>';
  }

  var slotTitles = { 'सुबह': 'सुबह की', 'दोपहर': 'दोपहर की', 'शाम': 'शाम की' };
  return '<div class="completion-card">' +
    '<div class="comp-top">' +
      '<div class="comp-badge">✓</div>' +
      '<div class="comp-title">' + slotTitles[currentSlot] + ' सभी खबरें पढ़ लीं!</div>' +
      '<div class="comp-sub">आज की ' + currentSlot + ' की एक नज़र पूरी हो गई।<br>आप अपडेट हैं।</div>' +
    '</div>' +
    '<div class="comp-divider"></div>' +
    '<div class="comp-habit">' +
      '<div class="comp-habit-title">आपकी reading streak</div>' +
      '<div class="habit-grid">' + habitHtml + '</div>' +
    '</div>' +
    '<div class="comp-divider"></div>' +
    '<div class="comp-next">' +
      '<div class="comp-next-title">दूसरी खबरें</div>' +
      '<div class="next-slot-row">' + nextHtml + '</div>' +
    '</div>' +
    '<div class="comp-share">' +
      '<button class="share-btn" onclick="shareBundle()">📤 &nbsp;दोस्तों को शेयर करें</button>' +
    '</div>' +
  '</div>';
}

function shareBundle() {
  var text = 'एक नज़र — Dainik Bhaskar की ' + currentSlot + ' की खबरें पढ़ी मैंने। आप भी पढ़ें!';
  if (navigator.share) {
    navigator.share({ title: 'एक नज़र', text: text, url: window.location.href });
  } else {
    navigator.clipboard.writeText(text + '\n' + window.location.href).then(function() {
      var btn = document.querySelector('.share-btn');
      if (btn) { btn.textContent = '✓ लिंक कॉपी हो गया!'; setTimeout(function() { btn.innerHTML = '📤 &nbsp;दोस्तों को शेयर करें'; }, 2000); }
    });
  }
}

function goTo(idx, animate) {
  if (typeof animate === 'undefined') animate = true;
  if (!cards.length) return;
  // cards.length is the completion card index
  idx = Math.max(0, Math.min(idx, cards.length));
  currentIdx = idx;
  var track = document.getElementById('cardTrack');
  if (!animate) track.style.transition = 'none';
  track.style.transform = 'translateX(-' + (idx * 100) + '%)';
  if (!animate) setTimeout(function() { track.style.transition = ''; }, 50);
  var isCompletion = (idx === cards.length);
  var footer = document.getElementById('cardFooter');
  if (isCompletion) {
    updateCounter(cards.length, cards.length);
    updateProgress(cards.length, cards.length);
    footer.style.display = 'none';
  } else {
    updateCounter(idx+1, cards.length);
    updateProgress(idx+1, cards.length);
    footer.style.display = 'block';
    var s = cards[idx];
    if (s) {
      var btn = document.getElementById('readMoreBtn');
      btn.href = s.deepLink || s.articleUrl || '#';
      btn.style.opacity = (s.deepLink || s.articleUrl) ? '1' : '0.4';
    }
  }
  var pb = document.getElementById('prevBtn'); var nb = document.getElementById('nextBtn');
  if (pb) pb.disabled = idx === 0;
  if (nb) nb.disabled = isCompletion;
}

function updateCounter(c,t) { document.getElementById('curNum').textContent = c||'—'; document.getElementById('totNum').textContent = t||'—'; }
function updateProgress(c,t) { document.getElementById('progressBar').style.width = t > 0 ? ((c/t)*100)+'%' : '0%'; }

var txS=0, tyS=0, drag=false;
var vp = document.getElementById('cardViewport');
vp.addEventListener('touchstart', function(e) { txS=e.touches[0].clientX; tyS=e.touches[0].clientY; }, {passive:true});
vp.addEventListener('touchend', function(e) {
  var dx=e.changedTouches[0].clientX-txS, dy=e.changedTouches[0].clientY-tyS;
  if (Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>40) goTo(dx<0?currentIdx+1:currentIdx-1);
}, {passive:true});
vp.addEventListener('mousedown', function(e) { txS=e.clientX; tyS=e.clientY; drag=true; e.preventDefault(); });
window.addEventListener('mouseup', function(e) {
  if (!drag) return; drag=false;
  var dx=e.clientX-txS, dy=e.clientY-tyS;
  if (Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>40) goTo(dx<0?currentIdx+1:currentIdx-1);
});
document.addEventListener('keydown', function(e) {
  if (e.key==='ArrowRight'||e.key==='ArrowDown') goTo(currentIdx+1);
  if (e.key==='ArrowLeft'||e.key==='ArrowUp') goTo(currentIdx-1);
});
window.addEventListener('storage', function(e) {
  if (e.key===STORAGE_KEY) { renderCards(); var t=document.getElementById('updateToast'); t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},3000); }
});

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('topbarSub').textContent = now.toLocaleDateString('hi-IN', {day:'numeric',month:'long'});
  var hr = now.getHours();
  switchSlot(hr < 12 ? 'सुबह' : (hr < 17 ? 'दोपहर' : 'शाम'));
});
</script>
</body>
</html>
